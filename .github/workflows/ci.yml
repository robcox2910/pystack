name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Clone sibling projects
        run: |
          cd ..
          git clone --depth 1 https://github.com/robcox2910/py-os.git os_learning
          git clone --depth 1 https://github.com/robcox2910/pebble-lang.git pebble-lang
          git clone --depth 1 https://github.com/robcox2910/pydb.git pydb
          git clone --depth 1 https://github.com/robcox2910/pyweb.git pyweb
          git clone --depth 1 https://github.com/robcox2910/pygit.git pygit
          git clone --depth 1 https://github.com/robcox2910/pycrypt.git pycrypt
          git clone --depth 1 https://github.com/robcox2910/pynet.git pynet
          git clone --depth 1 https://github.com/robcox2910/pysearch.git pysearch
          git clone --depth 1 https://github.com/robcox2910/pymq.git pymq
          git clone --depth 1 https://github.com/robcox2910/pykv.git pykv
          git clone --depth 1 https://github.com/robcox2910/pydocdb.git pydocdb
          git clone --depth 1 https://github.com/robcox2910/pygraphdb.git pygraphdb
          git clone --depth 1 https://github.com/robcox2910/pytsdb.git pytsdb
          git clone --depth 1 https://github.com/robcox2910/pyvecdb.git pyvecdb
          git clone --depth 1 https://github.com/robcox2910/pycoldb.git pycoldb

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format check
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run pyright src tests

      - name: Test
        run: uv run pytest --cov
